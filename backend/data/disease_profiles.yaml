    known_targets:
      - APP
      - PSEN1
      - PSEN2
      - MAPT
      - APOE
      - ACHE
      - BACE1
      - GSK3B

    target_relevance:
      APP: 1.00
      BACE1: 1.00
      MAPT: 0.95
      PSEN1: 0.95
      PSEN2: 0.90
      APOE: 0.90
      ACHE: 0.80
      GSK3B: 0.75
      CDK1: 0.20
      AURKB: 0.10

    biological_boost:
      APP: 3.0
      BACE1: 3.0
      PSEN1: 2.2
      MAPT: 2.5
      TREM2: 2.0
      PSEN2: 2.0
      ACHE: 2.0
      APOE: 1.8

    drug_evidence_keywords:
