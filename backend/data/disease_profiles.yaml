      - rutin
      - kaempferol

    mechanism_priors:
      "Neurodegeneration / amyloid-tau axis": 0.55
      "NF-kB / inflammatory signaling": 0.15
      "MAPK stress-response signaling": 0.10
      "Innate immune sensing": 0.10
      "General protein-target interaction": 0.10

    lifecycle_stages:
      "Amyloid processing":
        prior: 0.40
        targets: [APP, BACE1, PSEN1, PSEN2, APOE]
        drug_keywords:
          - aducanumab
          - lecanemab
          - donanemab

      "Tau/stress signaling":
        prior: 0.30
        targets: [MAPT, GSK3B, CDK5, MAPK1]
        drug_keywords:
          - lithium

      Neuroinflammation:
        prior: 0.20
        targets: [TREM2, NFKB1, CHUK, IKBKB, TNF]
        drug_keywords: []

      "Synaptic/cholinergic":
        prior: 0.10
        targets: [ACHE, CHRNA7, GRIN2B]
        drug_keywords:
          - donepezil
          - rivastigmine
          - galantamine

  # ---------------------------------------------------------------------------
